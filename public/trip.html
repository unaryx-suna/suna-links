<!DOCTYPE html>                                                               
  <html>                                                                        
  <head>                                                                        
    <meta charset="utf-8">                                                      
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Triggers the App Clip card automatically in iOS Safari -->             
    <meta name="apple-itunes-app" content="app-id=6759053765, 
  app-clip-bundle-id=com.unaryx.TravelMug.Clip">
    <title>Suna — Clone this Itinerary</title>                                  
    <style>
      body {                                                                    
        margin: 0; background: #111; color: white;          
        font-family: -apple-system, sans-serif;                                 
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; min-height: 100vh;                             
        text-align: center; padding: 24px; box-sizing: border-box;
      }                                                                         
      h1 { font-size: 28px; margin-bottom: 8px; }           
      p  { color: #aaa; margin-bottom: 32px; }                                  
      a  {                                
        background: #FFD76A; color: black; padding: 14px 32px;                  
        border-radius: 50px; text-decoration: none;                             
        font-weight: 700; font-size: 16px; display: inline-block;
      }                                                                         
    </style>                                                
  </head>                                                                       
  <body>
    <h1>🗺️  Clone this itinerary on Suna</h1>                                    
    <p>Get the free app to duplicate this trip to your plans</p>
    <a id="cta" href="https://apps.apple.com/app/id6759053765">Download Suna —
  Free</a>                                    
    <script>                                                                    
      var parts = window.location.pathname.split('/').filter(Boolean);
      var tripID = parts[1] || '';                                              
      var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      var btn = document.getElementById('cta');                                 
                                                                                
      if (isIOS && tripID) {                  
        // Universal link: opens full app if installed, or shows App Clip card  
  if not                                                    
        btn.href = 'https://app.unaryx.com/trip/' + tripID;                     
        btn.textContent = 'Open in Suna';     
      }                                                                         
    </script>                                               
  </body>                                                                       
  </html>
